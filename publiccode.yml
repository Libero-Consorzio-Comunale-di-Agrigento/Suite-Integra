description:
  it:
    shortDescription: Integra soluzioni per una Pubblica Amministrazione efficiente e innovativa
    longDescription: >
      **Suite Integra:**


      Integra è la suite gestionale che permette alla PA di operare in maniera
      efficiente ed innovativa in un contesto in cui l’evoluzione tecnologica è
      uno strumento al servizio delle Amministrazioni per il raggiungimento dei
      risultati attesi. È basata su una tecnologia web e cloud e su standard
      internazionali di sicurezza e comunicazione. I principali elementi
      qualificanti sono: innovazione tecnologica, rispetto costante della
      normativa, agevolazione dei processi amministrativi, efficientamento dei
      servizi pubblici e interoperabilità con le piattaforme abilitanti (tra cui
      SPID/CIE/eIDAS, SIOPE+, ANPR, INAD, ANSC, ANEL, BDAP, PagoPA, App IO,
      PDND, SEND).


      **Caratteristiche funzionali del servizio:**


      \*DIREZIONE GENERALE: Performance Organizzative / Valutazione delle
      Risorse / Cruscotti Direzionali / Sistema di reporting.


      \*AFFARI GENERALI: Protocollo Informatico / Atti Amministrativi / Gestione
      Contratti / Gestione documentale e gestione iter documentali (motore
      workflow nativo) / Scrivania Virtuale / Albo Pretorio / Trasparenza /
      Invio in Conservazione / Gestione firma digitale e sigillo elettronico /
      Interoperabilità con piattaforme abilitanti nazionali.


      \*BILANCIO: Gestione finanziaria ed economica conforme in tutte le sue
      funzionalità al D. Lgs 118 del 23 giugno 2011 / Cassa Economale /
      Patrimonio / Mutui / Finanziamenti e Opere Pubbliche / DUP / Fatturazione
      Elettronica / Magazzino e Inventari / Fascicolo Contabile / Monitoraggio
      Piano degli Investimenti / Gestione FPV.


      \*PARTECIPATE: Gestione amministrativa e segretariale delle società
      partecipate / Bilancio Consolidato.


      \*PROGRAMMAZIONE e CONTROLLO: Bilancio di Mandato / Contabilità analitica
      per Centri di Costo / Indicatori di Bilancio / Invii XBRL / Budget / Piano
      degli Obiettivi / Piano Esecutivo di Gestione (PEG) / Predisposizione
      documenti PIAO.


      \*TECNICO-TERRITORIALE: Pubblicazione dati geografici / Mappe tematiche /
      WebGIS.


      \*DEMOGRAFICI: Anagrafe / Stato Civile / Elettorale / Giudici Popolari /
      Statistiche / Leva militare / Carta Identità Elettronica.


      \*ENTRATE: Anagrafe contribuenti e immobiliare / Servizi a Domanda
      Individuale / Canoni / Imposte e tributi regionali, provinciali, comunali.


      \*RISORSE UMANE e ORGANIZZAZIONE: Struttura Organizzativa / Dotazione
      Organica / Gestione Giuridica / Gestione Economica / Rilevazione
      presenze-assenze / Buoni pasto / Formazione / Valutazione individuale /
      Fascicolo Elettronico del Dipendente / Salario Accessorio / Missione e
      Trasferte / Portale del Dipendente / Gestione iter approvativi / 770 /
      Conto annuale.


      \*SERVIZI a PERSONE e IMPRESE: Portale Istituzionale (Cittadino
      Informato), Servizi digitali (Cittadino Attivo) / Istanze on-line /
      Gestione pagamenti on-line (interoperabilità con PagoPA) / Gestione
      comunicazioni e notifiche (interoperabilità con App IO, SEND, mail, pec).
    features:
      - Risorse Umane
      - Atti e Protocollo
      - Contabilità e Controllo
      - Logistica e Patrimonio
      - Sportelli
      - Demografici
      - Entrate
      - Servizi alle persone e imprese
